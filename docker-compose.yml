services:
  db:
    image: postgres:16
    container_name: electromanfer_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER_ELECTROMANFER}
      POSTGRES_PASSWORD: ${DB_PASSWORD_ELECTROMANFER}
      POSTGRES_DB: ${DB_NAME_ELECTROMANFER}
    volumes:
      - postgres_data:/var/lib/postgresql/data
  backend:
    build:
      context: ./backend
    container_name: electromanfer_backend
    restart: always
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+psycopg://${DB_USER_ELECTROMANFER}:${DB_PASSWORD_ELECTROMANFER}@db:5432/${DB_NAME_ELECTROMANFER}
    volumes:
      - media_imagenes:/app/media/imagenes
      - media_fichas:/app/media/fichas
    depends_on:
      - db
  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    container_name: electromanfer_frontend
    restart: always
    volumes:
      - frontend_build:/usr/share/nginx/html
    depends_on:
      - backend
  nginx:
    image: nginx:alpine
    container_name: electromanfer_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - frontend_build:/usr/share/nginx/html
      - media_imagenes:/usr/share/nginx/media/imagenes
      - media_fichas:/usr/share/nginx/media/fichas
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - frontend
      - backend
volumes:
  postgres_data:
  media_imagenes:
  media_fichas:
  frontend_build:
