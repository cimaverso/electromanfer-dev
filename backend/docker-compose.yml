version: "3.9"

services:
  db:
    image: postgres:16
    container_name: electromanfer_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER_ELECTROMANFER}
      POSTGRES_PASSWORD: ${DB_PASSWORD_ELECTROMANFER}
      POSTGRES_DB: ${DB_NAME_ELECTROMANFER}
    ports:
      - "${DB_PORT_ELECTROMANFER}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: